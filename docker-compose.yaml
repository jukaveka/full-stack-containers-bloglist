services:
  app:
    build:
      context: bloglist-frontend
      dockerfile: Dockerfile
    ports:
      - 5173:80
    container_name: bloglist-frontend-prod

  server:
    build:
      context: bloglist-backend
      dockerfile: prod.Dockerfile
    env_file:
      - ./bloglist-backend/.env
    ports:
      - 3003:3003
    container_name: bloglist-backend-prod

  mongo:
    image: mongo:8.3.4-noble
    environment:
      MONGO_INITDB_ROOT_USERNAME: the_username
      MONGO_INITDB_ROOT_PASSWORD: the_password
      MONGO_INITDB_DATABASE: the_database
    volumes:
      - ./bloglist-backend/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - mongo_prod_data:/data/db
    container_name: bloglist-mongo-prod

volumes:
  mongo_prod_data: